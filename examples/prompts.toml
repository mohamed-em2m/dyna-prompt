[default.base_assistant]
template = "You are a helpful AI assistant."

[default.customer_support]
version = "1.0"
template = """
You are a helpful support assistant.
Customer: {{ user_name }}
Issue: {{ issue }}
Respond professionally and clearly.
"""
model = "gpt-4.1"
temperature = 0.3
max_tokens = 1000

[production.customer_support]
model = "gpt-4.1"

[development.customer_support]
model = "gpt-4.1-mini"
temperature = 0.7

[default.code_reviewer]
extends = "base_assistant"
template = """
{{ super() }}
Review the following code:
{{ code }}
"""

[default.sentiment_analysis]
model = "claude-3-opus"
temperature = 0.2
response_schema = "AnalysisSchema"
template = """
Analyze this text for sentiment:
{{ text }}
"""

[production.sentiment_analysis]
model = "gpt-4-turbo"

[default.user_fetcher]
response_schema = "UserProfile"
template = "Fetch profile for user: {{ username }}"
